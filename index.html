  <!-- JSON-LD: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How does Zenvylo find leads for freelancers?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Zenvylo uses AI to scan local markets and identify small businesses with weak online presence — slow websites, no SSL, few reviews, outdated web design, no social media — that are strong candidates for your specific service. Each lead gets an opportunity score (0-100) based on need, market demand, and competition."
        }
      },
      {
        "@type": "Question",
        "name": "Are Zenvylo leads exclusive to me?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Zenvylo maintains a global name registry. Once a business is discovered by any user, it is permanently blocked from appearing in other users' scan results — your leads are guaranteed to be yours alone. No competing with other Zenvylo users for the same prospect."
        }
      },
      {
        "@type": "Question",
        "name": "What is the pricing for Zenvylo?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Zenvylo is free to start with 3 scans per month. Paid plans: Starter $9/month (20 scans), Growth $19/month (50 scans + CRM + all countries), Pro $39/month (100 scans + AI tools + 7-day free trial), Scale $79/month (200 scans + all AI features). Individual scan packs also available from $5 for 5 scans."
        }
      },
      {
        "@type": "Question",
        "name": "What AI writing tools does Zenvylo include?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Pro and Scale plans include 8 AI tools: cold email drafts, phone call scripts, 30-60-90 day action roadmaps, full service proposals, pricing strategy advisor, 30-second elevator pitches, service package builders, and 5-email follow-up sequences. Scale plan also adds full business audit AI."
        }
      },
      {
        "@type": "Question",
        "name": "Can I cancel Zenvylo anytime?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. All Zenvylo plans are completely month-to-month with no contracts. Cancel anytime from your Settings — no fees, no penalties, no questions asked."
        }
      },
      {
        "@type": "Question",
        "name": "What countries does Zenvylo support for lead generation?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Zenvylo supports 35+ countries including United States, United Kingdom, Canada, Australia, Ireland, New Zealand, South Africa, Nigeria, Kenya, Germany, France, Philippines, India, UAE, Singapore, and many more. Starter plan is limited to your home country; Growth, Pro, and Scale plans unlock all countries."
        }
      },
      {
        "@type": "Question",
        "name": "Does Zenvylo require a credit card to start?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No credit card required to get started. The Free plan gives you 3 scans immediately. The Pro plan comes with a 7-day free trial — you can explore all AI features before deciding to pay."
        }
      }
    ]
  }
  </script>
