  <!-- JSON-LD: SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Zenvylo",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "description": "Find local businesses that desperately need your services. Zenvylo AI scores every lead, writes your outreach, and ensures zero duplicate leads.",

    "offers": [
      { "@type":"Offer","name":"Starter","price":"9.00","priceCurrency":"USD","description":"3 scans/month, 5 leads per scan" },
      { "@type":"Offer","name":"Growth","price":"19.00","priceCurrency":"USD","description":"15 scans/month, 5 leads per scan" },
      { "@type":"Offer","name":"Pro","price":"39.00","priceCurrency":"USD","description":"50 scans/month, 10 leads per scan, AI tools" },
      { "@type":"Offer","name":"Scale","price":"79.00","priceCurrency":"USD","description":"Unlimited scans, 25 leads per scan, all AI features" }

  </script>

  <!-- JSON-LD: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      { "@type":"Question","name":"How does Zenvylo find leads?","acceptedAnswer":{"@type":"Answer","text":"Zenvylo uses AI to scan local markets and identify small businesses with weak online presence — slow websites, no SSL, few reviews, or outdated web design — that are strong candidates for your services."} },
      { "@type":"Question","name":"Are leads exclusive to me?","acceptedAnswer":{"@type":"Answer","text":"Yes. Zenvylo maintains a global name registry. Once a business is discovered by any user it is permanently blocked from appearing in other users' scan results — your leads are yours alone."} },
      { "@type":"Question","name":"What is the pricing for Zenvylo?","acceptedAnswer":{"@type":"Answer","text":"Zenvylo starts at $9/month for the Starter plan (3 scans, 5 leads each). Growth is $19/month, Pro is $39/month with AI tools, and Scale is $79/month with unlimited scans."} },
      { "@type":"Question","name":"What AI features are included?","acceptedAnswer":{"@type":"Answer","text":"Pro and Scale plans include AI-generated cold emails, phone scripts, 30-60-90 day roadmaps, service proposals, pricing strategy, elevator pitches, service package builders, and follow-up email sequences."} },
      { "@type":"Question","name":"Can I cancel Zenvylo anytime?","acceptedAnswer":{"@type":"Answer","text":"Yes. All Zenvylo plans are month-to-month with no contracts. Cancel anytime from your Settings with no fees or penalties."} }
    ]
  }
  </script>
